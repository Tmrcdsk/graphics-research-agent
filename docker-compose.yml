services:
  graphics-agent:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    container_name: graphics-research-agent
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/agent.sqlite3}
      DRY_RUN: ${DRY_RUN:-true}
      ENABLED_SOURCES: ${ENABLED_SOURCES:-arxiv,unreal,nvidia,gpuopen,directx,vulkan,siggraph_realtime,siggraph_research}
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "app.main", "serve"]
